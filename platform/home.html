<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Engliza Academy | Home</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:flex-start;

    background:linear-gradient(
        135deg,
        #eef4ff,
        #f3efff
    );

    padding:50px 20px;

}

.container{

    width:100%;

    max-width:1100px;

}

.header{

    text-align:center;

    margin-bottom:40px;

}

.logo-row{

    display:flex;

    justify-content:center;

    align-items:center;

    gap:14px;

    margin-bottom:18px;

}

.logo{

    width:85px;

    height:85px;

    border-radius:50%;

    object-fit:cover;

}

h1{

    color:#1f3c88;

    font-size:30px;

}

.subtitle{

    color:#666;

    font-size:18px;

    line-height:1.8;

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="logo-row">

<img src="../owl.PNG"
class="logo">

<h1>

مرحبًا، عائشة 💜

</h1>

</div>

<p class="subtitle">

سعداء بعودتك، استمر في رحلتك التعليمية.

</p>

</div>

</div>

</body>

</html>
