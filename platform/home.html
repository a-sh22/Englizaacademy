<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Engliza Academy | Home</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#eef4ff,#f3efff);
    padding:50px 20px;
}

.container{
    width:100%;
    max-width:1100px;
    margin:auto;
}

.header{
    text-align:center;
    margin-bottom:40px;
}

.logo-row{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:14px;
    margin-bottom:18px;
}

.logo{
    width:95px;
    height:95px;
    border-radius:50%;
    object-fit:cover;
}

h1{
    color:#1f3c88;
    font-size:30px;
}

.subtitle{
    color:#666;
    font-size:18px;
    line-height:1.8;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:25px;
}

.card{
    background:white;
    border-radius:22px;
    padding:28px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.card h2{
    color:#1f3c88;
    font-size:28px;
    margin-bottom:15px;
}

.card p{
    color:#555;
    line-height:1.8;
    margin-bottom:20px;
}

.btn{
    width:100%;
    border:none;
    background:#2f6bff;
    color:white;
    padding:16px;
    border-radius:14px;
    font-size:17px;
    cursor:pointer;
    font-weight:600;
}

.btn:hover{
    opacity:.95;
}

@media(max-width:768px){

    h1{
        font-size:26px;
    }

    .subtitle{
        font-size:16px;
    }

    .card h2{
        font-size:24px;
    }

}

</style>
</head>

<body>

<div class="container">

    <div class="header">

        <div class="logo-row">

            <img src="../owl.PNG" class="logo">

            <h1>
                مرحبًا، اسم الطالب 💜
            </h1>

        </div>

        <p class="subtitle">
            سعداء بعودتك، استمر في رحلتك التعليمية.
        </p>

    </div>


    <div class="cards">

        <div class="card">

            <h2>📚 ابدأ تعلم اللغة الإنجليزية</h2>

            <p>
                تصفح جميع مستويات ودروس الكورس.
            </p>

            <button class="btn">
                الدخول
            </button>

        </div>


        <div class="card">

            <h2>📖 أكمل من حيث توقفت</h2>

            <p>
                ارجع مباشرة إلى آخر درس وصلت إليه.
            </p>

            <button class="btn">
                المتابعة
            </button>

        </div>


        <div class="card">

            <h2>💬 مجتمع الطلاب</h2>

            <p>
                اسأل واستفسر وتفاعل مع بقية الطلاب وفريق الأكاديمية.
            </p>

            <button class="btn">
                الدخول
            </button>

        </div>

    </div>

</div>

</body>
</html>
