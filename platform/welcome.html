<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Engliza Academy | Welcome</title>

<style>
  
.back-btn{
    display:inline-block;
    background:white;
    color:#1f3c88;
    text-decoration:none;
    padding:12px 22px;
    border-radius:16px;
    font-size:18px;
    font-weight:700;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
    transition:.3s;
    margin-bottom:35px;
}

.back-btn:hover{
    transform:translateY(-2px);
}
  
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#eef4ff,#f7f3ff);
min-height:100vh;
padding:30px 20px;
}

.container{
max-width:950px;
margin:auto;
}

  
.title{
text-align:center;
font-size:42px;
color:#1f3c88;
margin-bottom:15px;
}

.subtitle-top{
    text-align:center;
    color:#1f3c88;
    font-size:22px;
    font-weight:700;
    margin-top:15px;
}

.subtitle{
    text-align:center;
    color:#666;
    font-size:18px;
    line-height:1.9;
    margin-top:12px;
    margin-bottom:35px;
}

.video-box{
background:white;
padding:30px;
border-radius:30px;
box-shadow:0 12px 30px rgba(0,0,0,.08);
margin-bottom:30px;
}

.video-placeholder{
height:240px;
background:#f5f7ff;
border-radius:20px;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
font-weight:bold;
color:#1f3c88;
}

.level-card{

position:relative;

background:white;

padding:50px;

border-radius:35px;

box-shadow:0 20px 45px rgba(0,0,0,.09);

overflow:visible;

margin-top:20px;

}

.text-side{

max-width:650px;
margin-right:140px;

}

.text-side h2{

color:#1f3c88;

font-size:34px;

line-height:1.7;

margin-bottom:18px;

}

.text-side p{

color:#666;

font-size:20px;

line-height:2;

margin-bottom:25px;

}

.start-btn{

background:linear-gradient(
90deg,
#3768ff,
#6f43ff
);

color:white;

border:none;

padding:18px 45px;

font-size:20px;

font-weight:600;

border-radius:18px;

cursor:pointer;

box-shadow:0 10px 20px rgba(55,104,255,.3);

}

.start-btn:hover{

opacity:.95;

}

.owl-side{

position:absolute;

left:-35px;

bottom:-5px;

}

.owl-side img{

width:210px;

filter:drop-shadow(
0 15px 20px rgba(0,0,0,.18)
);

}
@media(min-width:769px){

.level-card{

display:flex;
align-items:center;
justify-content:center;

}

.text-side{

display:flex;
flex-direction:column;
align-items:center;
text-align:center;

}

.text-side p{

max-width:650px;

}

}
@media(max-width:768px){

.title{
font-size:34px;
}

.subtitle{
font-size:17px;
}

.video-placeholder{
height:180px;
font-size:22px;
}

.level-card{
padding:30px;
}

.text-side{

margin-right:0;

padding-left:65px;

}

.text-side h2{

font-size:26px;

}

.text-side p{

font-size:16px;

}

.start-btn{

width:100%;

}

.owl-side{

left:-15px;

bottom:-5px;

}

.owl-side img{

width:120px;

}

}

</style>

</head>

<body>

<div class="container">

<a href="home.html" class="back-btn">
⬅ رجوع
</a>

<h1 class="title">
مرحبًا بك ✨
</h1>

<p class="subtitle-top">
خلّنا نبدأ صح 🤩
</p>

<p class="subtitle">
💜 شوف الفيديو السريع أول، وبعدها بنحدد لك أفضل نقطة تبدأ منها.
</p>


<div class="video-box">

<div class="video-placeholder">

🎥 الفيديو الترحيبي

</div>

</div>



<div class="level-card">

<div class="owl-side">

<img src="../owl2.png.PNG">

</div>



<div class="text-side">

<h2>

خلّيني أساعدك تبدأ من المكان المناسب 🤓💜

</h2>

<p>

جاوب على كم سؤال بسيط، وبعدها بنحدد لك أفضل نقطة تبدأ منها، عشان تبدأ رحلتك بطريقة مناسبة لك.

</p>

<button class="start-btn">

🚀 يلا نبدأ

</button>

</div>

</div>

</div>

</body>

</html>
