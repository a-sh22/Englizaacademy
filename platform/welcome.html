<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Engliza Academy | Welcome</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#eef4ff,#f3efff);
padding:40px 20px;
min-height:100vh;
}

.container{
max-width:1000px;
margin:auto;
}

.back-btn{
display:inline-block;
margin-bottom:25px;
text-decoration:none;
color:#1f3c88;
font-size:18px;
font-weight:600;
}

.title{
text-align:center;
color:#1f3c88;
font-size:34px;
margin-bottom:25px;
}

.video-card{
background:white;
padding:20px;
border-radius:22px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
margin-bottom:35px;
}

.video-placeholder{

height:260px;

background:#eef4ff;

border-radius:18px;

display:flex;

justify-content:center;

align-items:center;

font-size:30px;

color:#1f3c88;

font-weight:700;

}

.level-section{

display:flex;

align-items:center;

gap:25px;

}

.owl{

width:150px;

}

.text-box h2{

color:#1f3c88;

font-size:32px;

margin-bottom:15px;

}

.text-box p{

color:#555;

font-size:20px;

line-height:1.9;

margin-bottom:25px;

}

.start-btn{

border:none;

background:#2f6bff;

color:white;

padding:18px 40px;

border-radius:14px;

font-size:18px;

font-weight:600;

cursor:pointer;

}

.start-btn:hover{

opacity:.95;

}

@media(max-width:768px){

.level-section{

flex-direction:row;

align-items:center;

}

.owl{

width:100px;

}

.text-box h2{

font-size:24px;

}

.text-box p{

font-size:16px;

}

.video-placeholder{

height:190px;

font-size:24px;

}

}

</style>

</head>

<body>

<div class="container">

<a href="home.html" class="back-btn">

⬅ العودة للصفحة السابقة

</a>

<h1 class="title">

مرحبًا بك ✨

</h1>

<div class="video-card">

<div class="video-placeholder">

🎥 الفيديو الترحيبي

</div>

</div>

<div class="level-section">

<img src="../owl-thinking.jpg" class="owl">
  
<div class="text-box">

<h2>

خليني أساعدك تبدأ من المكان المناسب 🤓💜

</h2>

<p>

جاوب على كم سؤال بسيط، وبعدها بنحدد لك أفضل بداية تناسب مستواك.

</p>

<button class="start-btn">

ابدأ الاختبار

</button>

</div>

</div>

</div>

</body>

</html>
