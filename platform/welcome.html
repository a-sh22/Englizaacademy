<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Engliza Academy | Welcome</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#eef4ff,#f7f3ff);
min-height:100vh;
padding:30px 20px;
}

.container{
max-width:1000px;
margin:auto;
}

.back-btn{
display:inline-block;
background:white;
color:#1f3c88;
text-decoration:none;
padding:14px 24px;
border-radius:18px;
font-size:18px;
font-weight:700;
box-shadow:0 10px 25px rgba(0,0,0,.08);
margin-bottom:40px;
transition:.3s;
}

.back-btn:hover{
transform:translateY(-3px);
}

.title{
text-align:center;
font-size:54px;
color:#1f3c88;
margin-bottom:15px;
}

.subtitle-top{
text-align:center;
font-size:28px;
font-weight:700;
color:#1f3c88;
margin-bottom:10px;
}

.subtitle{
text-align:center;
font-size:20px;
color:#666;
line-height:1.9;
margin-bottom:40px;
}

.video-box{
background:white;
padding:30px;
border-radius:35px;
box-shadow:0 15px 35px rgba(0,0,0,.08);
margin-bottom:35px;
}

.video-placeholder{
height:250px;
background:#f5f7ff;
border-radius:25px;
display:flex;
justify-content:center;
align-items:center;
font-size:34px;
font-weight:bold;
color:#1f3c88;
}

.level-card{

position:relative;

background:white;
border-radius:35px;

padding:120px 50px 50px;

box-shadow:0 15px 35px rgba(0,0,0,.08);

text-align:center;

overflow:visible;

}

.owl-side{

position:absolute;

top:-95px;

left:50%;

transform:translateX(-50%);

}

.owl-side img{

width:180px;

filter:drop-shadow(
0 18px 25px rgba(0,0,0,.18)
);

}

.text-side{

text-align:center;

}

.text-side h2{

font-size:42px;
color:#1f3c88;
line-height:1.6;
margin-bottom:20px;

}

.text-side p{

font-size:21px;
color:#666;
line-height:2;
margin-bottom:30px;

}

.start-btn{

background:linear-gradient(
90deg,
#3768ff,
#6f43ff
);

color:white;
border:none;
padding:20px 55px;
font-size:22px;
font-weight:bold;
border-radius:20px;
cursor:pointer;
box-shadow:0 12px 25px rgba(55,104,255,.3);
transition:.3s;

}

.start-btn:hover{

transform:translateY(-3px);

}
.top-owl{

position:absolute;

top:25px;

left:25px;

}

.top-owl img{

width:clamp(65px,8vw,95px);

height:clamp(65px,8vw,95px);

border-radius:50%;

background:white;

padding:6px;

object-fit:cover;

box-shadow:
0 10px 25px rgba(0,0,0,.12);

}
  
@media(max-width:768px){

.title{
font-size:40px;
}

.subtitle-top{
font-size:24px;
}

.subtitle{
font-size:18px;
}

.video-placeholder{
height:180px;
font-size:25px;
}

.level-card{

padding:90px 25px 30px;

}

  
.text-side h2{

font-size:30px;

}

.text-side p{

font-size:17px;

}

.start-btn{

width:100%;

}

}

</style>

</head>

<body>

<div class="container">

<a href="home.html" class="back-btn">
⬅️ رجوع
</a>
  
<div class="top-owl">
    <img src="../okay.owl.PNG">
</div>
  
<h1 class="title">
مرحبًا بك ✨
</h1>

<p class="subtitle-top">
خلّنا نبدأ صح 🤩
</p>

<p class="subtitle">
💜 شوف الفيديو السريع أول، وبعدها بنحدد لك أفضل نقطة تبدأ منها.
</p>

<div class="video-box">

<div class="video-placeholder">
🎥 الفيديو الترحيبي
</div>

</div>

<div class="level-card">


<div class="text-side">

<h2>
خلّيني أساعدك تبدأ من المكان المناسب 🤓💜
</h2>

<p>
جاوب على كم سؤال بسيط، وبعدها بنحدد لك أفضل نقطة تبدأ منها، عشان تبدأ رحلتك بطريقة مناسبة لك.
</p>

<button class="start-btn">
🚀 يلا نبدأ
</button>

</div>

</div>

</div>

</body>
</html>
