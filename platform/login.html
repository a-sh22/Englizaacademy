<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engliza Academy | Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(
        135deg,
        #eef4ff,
        #f3efff
    );
    padding:20px;
}

.container{
    width:100%;
    max-width:420px;
}

.header{
    text-align:center;
    margin-bottom:30px;
}

.logo-row{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:12px;
    margin-bottom:12px;
}

.logo{
    width:60px;
    height:60px;
    border-radius:50%;
    object-fit:cover;
}

h1{
    font-size:26px;
    color:#1f3c88;
}

.subtitle{
    color:#666;
    line-height:1.7;
    font-size:15px;
}

.card{
    background:white;
    border-radius:18px;
    padding:22px;
    margin-bottom:18px;
    box-shadow:0 8px 25px rgba(0,0,0,.08);
}

.card h2{
    color:#1f3c88;
    margin-bottom:8px;
}

.card p{
    color:#666;
    font-size:14px;
    margin-bottom:16px;
}

.btn-login{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#2f6bff;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.btn-register{
    width:100%;
    padding:14px;
    border:2px solid #2f6bff;
    border-radius:12px;
    background:white;
    color:#2f6bff;
    font-size:16px;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

    <div class="header">

        <div class="logo-row">

            <!-- صورة البومة -->
            <img src="../owl.PNG" class="logo">

            <h1>Engliza Academy</h1>

        </div>

        <p class="subtitle">
            ابدأ رحلتك التعليمية أو أكمل من حيث توقفت
        </p>

    </div>

    <div class="card">

        <h2>👤 تسجيل الدخول</h2>

        <p>
            إذا سبق لك إنشاء حساب في المنصة.
        </p>

        <button class="btn-login">
            تسجيل الدخول
        </button>

    </div>

    <div class="card">

        <h2>✨ إنشاء حساب</h2>

        <p>
            إذا كانت هذه أول زيارة لك بعد شراء الكورس.
        </p>

        <button class="btn-register">
            إنشاء حساب
        </button>

    </div>

</div>

</body>
</html>
