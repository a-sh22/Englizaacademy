<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Engliza Academy | Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    background:linear-gradient(
        135deg,
        #eef4ff,
        #f3efff
    );
    padding:50px 20px;
}

.container{
    width:100%;
    max-width:420px;
}

.header{
    text-align:center;
    margin-bottom:35px;
}

.welcome-text{
    font-size:20px;
    color:#555;
    margin-bottom:0;
    font-weight:600;
}

.logo-row{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:14px;
    margin-top:8px;
    margin-bottom:18px;
}

.logo{
    width:95px;
    height:95px;
    border-radius:50%;
    object-fit:cover;
}

h1{
    font-size:28px;
    color:#1f3c88;
    font-weight:700;
}

.subtitle{
    color:#555;
    line-height:1.8;
    font-size:17px;
}

.card{
    background:white;
    border-radius:22px;
    padding:26px;
    margin-bottom:22px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.card h2{
    color:#1f3c88;
    margin-bottom:14px;
    font-size:34px;
}

.card p{
    color:#444;
    font-size:16px;
    line-height:1.8;
    font-weight:500;
    margin-bottom:18px;
}

.btn-login{
    width:100%;
    padding:16px;
    border:none;
    border-radius:14px;
    background:#2f6bff;
    color:white;
    font-size:18px;
    font-weight:600;
    cursor:pointer;
}

.btn-register{
    width:100%;
    padding:16px;
    border:2px solid #2f6bff;
    border-radius:14px;
    background:white;
    color:#2f6bff;
    font-size:18px;
    font-weight:600;
    cursor:pointer;
}

.btn-login:hover{
    opacity:.95;
}

.btn-register:hover{
    background:#f8fbff;
}

.form-container{
    display:none;
    margin-top:20px;
}

.form-container input{
    width:100%;
    padding:14px;
    border:1px solid #d8d8d8;
    border-radius:12px;
    margin-bottom:12px;
    font-size:15px;
}

.submit-btn{
    margin-top:10px;
}

.forgot-password{
    display:block;
    margin-top:4px;
    margin-bottom:12px;
    color:#2f6bff;
    text-decoration:none;
    font-size:14px;
}

.password-note{
    font-size:14px !important;
    color:#555 !important;
    margin-top:4px;
    margin-bottom:14px !important;
    line-height:1.7;
}

</style>

</head>

<body>

<div class="container">

<div class="header">

<p class="welcome-text">
أهلًا بك في
</p>

<div class="logo-row">

<img src="../owl.PNG" class="logo">

<h1>Engliza Academy</h1>

</div>

<p class="subtitle">
ابدأ رحلتك التعليمية أو أكمل من حيث توقفت
</p>

</div>
<div class="card">

    <h2>👤 تسجيل الدخول</h2>

    <p>
        لديك حساب بالفعل؟ سجّل دخولك من هنا.
    </p>

    <button
        id="loginBtn"
        class="btn-login"
        onclick="showLogin()">

        تسجيل الدخول

    </button>

    <div id="loginForm" class="form-container">

        <input
            type="email"
            placeholder="البريد الإلكتروني">

        <input
            type="password"
            placeholder="كلمة المرور">

        <a href="#" class="forgot-password">

            نسيت كلمة المرور؟

        </a>

        <button class="btn-login submit-btn">

            تسجيل الدخول

        </button>

    </div>
<div class="card">

    <h2>✨ إنشاء حساب</h2>

    <p>
        أول زيارة لك؟ أنشئ حسابك للبدء.
    </p>

    <button
        id="registerBtn"
        class="btn-register"
        onclick="showRegister()">

        إنشاء حساب

    </button>

    <div id="registerForm" class="form-container">

        <input
            type="text"
            placeholder="الاسم الكامل">

        <input
            type="email"
            placeholder="البريد الإلكتروني">

        <input
            type="password"
            placeholder="كلمة المرور">

        <p class="password-note">

            🔒 احتفظ بكلمة المرور في مكان آمن، ستحتاج إليها عند تسجيل الدخول مستقبلًا.

        </p>

        <button class="btn-login submit-btn">

            إنشاء الحساب

        </button>

    </div>

</div>

</div>

<script>

function showLogin(){

    document.getElementById("loginForm").style.display = "block";

    document.getElementById("loginBtn").style.display = "none";

    document.getElementById("registerForm").style.display = "none";

    document.getElementById("registerBtn").style.display = "block";
}

function showRegister(){

    document.getElementById("registerForm").style.display = "block";

    document.getElementById("registerBtn").style.display = "none";

    document.getElementById("loginForm").style.display = "none";

    document.getElementById("loginBtn").style.display = "block";
}

</script>

</body>

</html>
    
</div>
